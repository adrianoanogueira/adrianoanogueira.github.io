<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desde 27/11/2025 ❤️</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#14001f; /* roxo escuro */
    overflow-x:hidden;
    color:white;
    scroll-behavior:smooth;
}

/* TELA INICIAL */
#intro-screen{
    position:fixed;
    width:100%;
    height:100vh;
    background:#1a002b;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
    transition:opacity 2s ease;
}

#intro-screen h1{
    font-weight:300;
    font-size:22px;
    opacity:0.8;
}

/* SEÇÕES */
section{
    position:relative;
    height:100vh;
    overflow:hidden;
}

img{
    width:100%;
    height:100vh;
    object-fit:cover;
    filter:brightness(60%);
    transition:opacity 2s ease, transform 8s ease;
}

.overlay{
    position:absolute;
    bottom:15%;
    width:100%;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
}

.center{
    top:50%;
    transform:translateY(-50%);
    bottom:auto;
}

.fade{
    opacity:0;
    transition:opacity 1.5s ease, transform 1.5s ease;
    transform:translateY(20px);
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* transição suave entre fotos */
section{
    opacity:0;
    transition:opacity 2s ease;
}

section.visible{
    opacity:1;
}

.vignette{
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
}
</style>
</head>

<body>

<!-- TELA ROXA INICIAL -->
<div id="intro-screen">
    <h1>Desde 27/11/2025 ✨</h1>
</div>

<!-- FOTO 11 -->
<section>
    <img src="imagens/foto11.jpg">
    <div class="vignette"></div>
    <div class="overlay center fade">
        <p>Eu já não imaginava mais meus dias sem você.</p>
    </div>
</section>

<!-- FOTO 1 -->
<section>
    <img src="imagens/foto1.jpg">
    <div class="vignette"></div>
    <div class="overlay fade">
        <p>Começamos o ano juntos… e começávamos algo maior.</p>
    </div>
</section>

<!-- FOTO 2 -->
<section>
    <img src="imagens/foto2.jpg">
    <div class="vignette"></div>
    <div class="overlay fade">
        <p>Na praia, entre o mar e o céu, eu já sentia paz.</p>
    </div>
</section>

<!-- FOTO 3 -->
<section>
    <img src="imagens/foto3.jpg">
    <div class="vignette"></div>
    <div class="overlay fade">
        <p>O som das ondas… e sua risada.</p>
    </div>
</section>

<!-- FOTO 4 -->
<section>
    <img src="imagens/foto4.jpg">
    <div class="vignette"></div>
    <div class="overlay fade">
        <h2>Nosso Compromisso 💍</h2>
        <p>Quero estar sempre junto com você.</p>
    </div>
</section>

<!-- RESTANTE -->
<section><img src="imagens/foto5.jpg"><div class="vignette"></div></section>
<section><img src="imagens/foto6.jpg"><div class="vignette"></div></section>
<section><img src="imagens/foto7.jpg"><div class="vignette"></div></section>
<section><img src="imagens/foto8.jpg"><div class="vignette"></div></section>
<section><img src="imagens/foto9.jpg"><div class="vignette"></div></section>
<section><img src="imagens/foto10.jpg"><div class="vignette"></div></section>
<section><img src="imagens/foto12.jpg"><div class="vignette"></div></section>

<script>
/* Delay inicial */
setTimeout(() => {
    const intro = document.getElementById("intro-screen");
    intro.style.opacity = "0";
    setTimeout(()=> intro.style.display="none",2000);
}, 3000);

/* Fade das seções */
const sections = document.querySelectorAll("section");
const faders = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add("visible");
            const overlay = entry.target.querySelector(".fade");
            if(overlay){
                setTimeout(()=> overlay.classList.add("show"),500);
            }
        }
    });
},{threshold:0.6});

sections.forEach(section => observer.observe(section));
</script>

</body>
</html>
